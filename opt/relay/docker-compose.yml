services:
  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    networks:
      - relay-net

  relay-gateway:
    build:
      context: ../..
      dockerfile: opt/relay/Dockerfile
    image: escluse/relay-gateway:latest
    container_name: relay-gateway
    restart: unless-stopped
    environment:
      - GATEWAY_HMAC_SECRET=${GATEWAY_HMAC_SECRET}
      - RUST_LOG=info
      - RELAY_CONFIG=/etc/relay-gateway/relay-gateway.toml
    volumes:
      - ./relay-gateway.toml:/etc/relay-gateway/relay-gateway.toml:ro
    ports:
      - "25565:25565"   # NLB-targeted raw TCP for MC Java
      - "8080:8080"     # Tunnel listener (for direct WS without Caddy)
      - "9100:9100"     # Prometheus /metrics (D-22; NOT 9090)
    networks:
      - relay-net
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    build:
      context: ../..
      dockerfile: opt/relay/Caddy.Dockerfile
    image: escluse/relay-caddy:latest
    container_name: relay-caddy
    restart: unless-stopped
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - relay-net
    depends_on:
      relay-gateway:
        condition: service_healthy

networks:
  relay-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
