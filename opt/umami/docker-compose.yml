services:
  umami:
    image: ghcr.io/umami-software/umami:latest
    container_name: umami
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      APP_SECRET: "${APP_SECRET}"
      DISABLE_TELEMETRY: "1"
      DISABLE_UPDATES: "1"
      TRACKER_SCRIPT_NAME: "${TRACKER_SCRIPT_NAME}"
      COLLECT_API_ENDPOINT: "${COLLECT_API_ENDPOINT}"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - umami-net

  caddy:
    image: caddy:2
    container_name: umami-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      umami:
        condition: service_started
    networks:
      - umami-net

networks:
  umami-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
