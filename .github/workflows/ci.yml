name: CI

on:
  pull_request:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Windows cross-compile libraries (Npcap SDK)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          curl -sL "https://npcap.com/dist/npcap-sdk-1.13.zip" -o /tmp/npcap-sdk.zip
          unzip -q -o /tmp/npcap-sdk.zip -d /tmp/npcap-sdk/
          mkdir -p /tmp/npcap-lib
          echo "EXPORTS
PacketOpenAdapter
PacketCloseAdapter
PacketRequest
PacketSendPacket
PacketSetBuff
PacketGetNetInfo
PacketGetAdapterNames" > /tmp/packet.def
          x86_64-w64-mingw32-dlltool -d /tmp/packet.def -l /tmp/npcap-lib/libPacket.a -k -A
          echo "LIB_FOR_XWIN=/tmp/npcap-lib" >> "$GITHUB_ENV"
      - name: Build
        run: |
          RUSTFLAGS="-L ${LIB_FOR_XWIN:-}" cargo build --release --manifest-path Cargo.toml \
            --target ${{ matrix.target }}

  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --manifest-path Cargo.toml -- -D warnings

  test:
    name: test (linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build tests
        run: cargo test --manifest-path Cargo.toml --no-run
      - name: Run tests
        run: cargo test --manifest-path Cargo.toml --all

  audit:
    name: security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
