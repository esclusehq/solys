name: Canary
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: escluse-agent
  PROJECT_PATH: agent/solys
  R2_BUCKET: solys-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: ""
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        run: |
          cargo build --release --manifest-path ${{ env.PROJECT_PATH }}/Cargo.toml \
            --target ${{ matrix.target }}
      - name: Stage binary
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          mkdir -p staging
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}"
          cp "$SRC" "staging/${{ env.BINARY_NAME }}${{ matrix.ext }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.PROJECT_PATH }}/staging/

  package:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: false
      - name: Create archives
        run: |
          mkdir -p release
          # Linux x86_64
          if [ -d "binary-x86_64-unknown-linux-gnu" ]; then
            tar czf release/solys-linux-x86_64.tar.gz \
              -C binary-x86_64-unknown-linux-gnu escluse-agent
          fi
          # Linux aarch64
          if [ -d "binary-aarch64-unknown-linux-gnu" ]; then
            tar czf release/solys-linux-aarch64.tar.gz \
              -C binary-aarch64-unknown-linux-gnu escluse-agent
          fi
          # Windows x86_64
          if [ -d "binary-x86_64-pc-windows-gnu" ]; then
            cd binary-x86_64-pc-windows-gnu
            zip ../release/solys-windows-x86_64.zip escluse-agent.exe
            cd ..
          fi
      - name: Generate SHA256 checksums
        working-directory: release/
        run: sha256sum * > SHA256SUMS.txt
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/

  sign:
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Sign checksums with cosign
        run: |
          cosign sign-blob SHA256SUMS.txt \
            --bundle SHA256SUMS.txt.bundle \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-signed
          path: .
          include-hidden-files: true

  upload:
    needs: [sign]
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-signed
      - name: Create version.json for canary
        run: |
          echo "{\"version\": \"${GITHUB_SHA::7}\", \"date\": \"$(date -u +%Y-%m-%d)\"}" > version.json
      - name: Upload to R2 (canary)
        run: |
          aws s3 cp . "s3://${R2_BUCKET}/canary/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --recursive \
            --exclude ".git/*"
